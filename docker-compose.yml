# Desarrollo: backend (API) + frontend (Vite) + PostgreSQL opcional.
# Uso: docker compose up --build
#   - Frontend: http://localhost:5173  (proxy /api y /auth → backend)
#   - API:      http://localhost:4000
#
# Base de datos:
#   - Con el servicio `db` abajo: en backend/.env define
#       DATABASE_URL=postgresql://blog:blog_secret@db:5432/blog
#   - Postgres solo en tu máquina (sin contenedor db): usa host.docker.internal
#       (Docker Desktop) o la IP del host en Linux, p. ej.
#       DATABASE_URL=postgresql://user:pass@host.docker.internal:5432/nombre_bd
#
# Migraciones (primera vez): docker compose run --rm backend npm run migrate

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_secret
      POSTGRES_DB: blog
    # Host 5433 para no chocar con un Postgres local en 5432
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      SESSION_SECRET: dev-session-secret-change-in-prod
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:4000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata_dev:
  backend_node_modules:
  frontend_node_modules:
